<!DOCTYPE html><html class="dark" lang="vi"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Đăng nhập - HCMRainVision</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-on-surface": "#233143",
                      "tertiary-container": "#65f2b5",
                      "secondary-fixed": "#d8e2ff",
                      "surface-tint": "#00ddd6",
                      "on-tertiary-fixed": "#002113",
                      "background": "#051424",
                      "surface-container-high": "#1c2b3c",
                      "error-container": "#93000a",
                      "on-primary-fixed": "#00201e",
                      "on-primary-container": "#006a66",
                      "on-primary-fixed-variant": "#00504d",
                      "on-secondary-container": "#e6ecff",
                      "surface-variant": "#273647",
                      "on-tertiary": "#003824",
                      "surface-container-lowest": "#010f1f",
                      "on-secondary": "#002e6a",
                      "on-secondary-fixed-variant": "#004395",
                      "primary-container": "#00f2ea",
                      "surface": "#051424",
                      "on-tertiary-container": "#006d4a",
                      "on-background": "#d4e4fa",
                      "on-surface": "#d4e4fa",
                      "on-secondary-fixed": "#001a42",
                      "on-error-container": "#ffdad6",
                      "surface-dim": "#051424",
                      "secondary": "#adc6ff",
                      "error": "#ffb4ab",
                      "outline": "#849492",
                      "surface-container-highest": "#273647",
                      "primary-fixed": "#29fcf3",
                      "tertiary": "#d8ffe7",
                      "on-error": "#690005",
                      "primary-fixed-dim": "#00ddd6",
                      "outline-variant": "#3a4a48",
                      "secondary-fixed-dim": "#adc6ff",
                      "on-surface-variant": "#b9cac8",
                      "inverse-primary": "#006a66",
                      "inverse-surface": "#d4e4fa",
                      "surface-bright": "#2c3a4c",
                      "surface-container-low": "#0d1c2d",
                      "on-tertiary-fixed-variant": "#005236",
                      "tertiary-fixed": "#6ffbbe",
                      "primary": "#cffffb",
                      "tertiary-fixed-dim": "#4edea3",
                      "surface-container": "#122131",
                      "secondary-container": "#0566d9",
                      "on-primary": "#003735"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xs": "4px",
                      "md": "16px",
                      "sm": "8px",
                      "gutter": "12px",
                      "container_margin": "16px",
                      "base": "4px",
                      "lg": "24px",
                      "xl": "32px"
              },
              "fontFamily": {
                      "label-lg": ["Inter"],
                      "body-sm": ["Inter"],
                      "title-sm": ["Inter"],
                      "display-lg": ["Inter"],
                      "headline-md": ["Inter"],
                      "label-sm": ["Inter"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "label-lg": ["13px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "title-sm": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
              }
            }
          }
        }
    </script>
<style>
        body {
            background-image: radial-gradient(circle at 50% -20%, #162529 0%, #051424 60%);
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(22, 37, 41, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .input-glass {
            background: rgba(22, 37, 41, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            border-color: #00F2EA;
            box-shadow: 0 0 0 2px rgba(0, 242, 234, 0.2);
            outline: none;
        }
        .btn-glow {
            box-shadow: 0 0 20px rgba(0, 242, 234, 0.2);
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            box-shadow: 0 0 30px rgba(0, 242, 234, 0.4);
            transform: translateY(-1px);
        }
        .error-message {
            animation: slideDown 0.3s ease-out forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center p-container_margin">
<!-- Ambient Background Elements -->
<div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none -z-10">
<div class="absolute top-[10%] left-[20%] w-96 h-96 bg-primary-container opacity-[0.03] rounded-full blur-[100px]"></div>
<div class="absolute bottom-[20%] right-[10%] w-64 h-64 bg-tertiary-container opacity-[0.03] rounded-full blur-[80px]"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-[400px] flex flex-col items-center gap-lg">
<!-- Brand Header -->
<div class="flex flex-col items-center gap-sm text-center mb-md">
<div class="w-16 h-16 rounded-2xl bg-surface-variant flex items-center justify-center mb-sm border border-outline-variant/30">
<span class="material-symbols-outlined text-primary-container text-[32px]">location_on</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface tracking-tight">
                HCMRain<span class="text-primary-container">Vision</span>
</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Nền tảng di chuyển thông minh TP.HCM
            </p>
</div>
<!-- Login Card -->
<div class="glass-panel w-full rounded-xl p-lg flex flex-col gap-lg relative overflow-hidden">
<!-- Subtle gradient top border accent inside card -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary-container to-transparent opacity-50"></div>
<!-- Error State Example (Visible in this prompt) -->
<div class="error-message bg-error-container/20 border border-error/30 rounded-lg p-sm flex items-start gap-sm">
<span class="material-symbols-outlined text-error text-[20px] mt-[2px]">error</span>
<p class="font-body-sm text-body-sm text-error">Username hoặc mật khẩu không đúng</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Username Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-sm" for="username">Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="input-glass w-full rounded-lg py-sm pl-[40px] pr-sm font-body-sm text-body-sm text-on-surface placeholder:text-outline-variant focus:ring-0" id="username" placeholder="Nhập tên đăng nhập" type="text">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center ml-sm mr-sm">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary-fixed hover:text-primary-fixed-dim transition-colors" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="input-glass w-full rounded-lg py-sm pl-[40px] pr-sm font-body-sm text-body-sm text-on-surface placeholder:text-outline-variant focus:ring-0" id="password" placeholder="Nhập mật khẩu" type="password">
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-on-primary-container font-title-sm text-title-sm py-[12px] rounded-lg mt-sm btn-glow" type="submit">
                    Đăng nhập
                </button>
</form>
<!-- Secondary Actions -->
<div class="flex flex-col gap-sm items-center mt-sm">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Chưa có tài khoản? <a class="font-label-lg text-label-lg text-primary-fixed hover:text-primary-fixed-dim transition-colors ml-xs" href="#">Tạo tài khoản</a>
</p>
<div class="w-full flex items-center gap-sm my-sm opacity-30">
<div class="h-px bg-outline-variant flex-1"></div>
<span class="font-label-sm text-label-sm text-outline-variant uppercase">Hoặc</span>
<div class="h-px bg-outline-variant flex-1"></div>
</div>
<a class="flex items-center gap-sm font-label-lg text-label-lg text-on-surface hover:text-primary-container transition-colors group" href="#">
<span class="material-symbols-outlined text-outline group-hover:text-primary-container transition-colors">map</span>
                    Xem bản đồ không cần đăng nhập
                </a>
</div>
</div>
</main>
<!-- Footer Component (Suppressed per guidelines for transactional login screen, kept minimal) -->
<div class="mt-xl opacity-60">
<p class="font-label-sm text-label-sm text-on-surface-variant text-center">Nguồn ảnh: Cổng thông tin giao thông TP.HCM</p>
</div>
</body></html>
